<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temperature Sensor Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#15181c;
    --panel:#1d2127;
    --panel-2:#22272e;
    --line:#2d333b;
    --line-soft:#262b32;
    --ink:#e7eaed;
    --ink-dim:#9aa3ad;
    --ink-faint:#6b747e;
    --accent:#ee9b3a;       /* signal amber: the one bold color */
    --accent-dim:#8a6029;
    --cold:#4ea3e0;
    --hot:#e2533b;
    --good:#6fcf8e;
    --warn:#e0b24e;
    --bad:#e2705c;
    --mono:"IBM Plex Mono",ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans:"IBM Plex Sans",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);
    -webkit-font-smoothing:antialiased;font-size:15px;line-height:1.5}
  a{color:var(--accent)}
  .wrap{max-width:1080px;margin:0 auto;padding:28px 20px 64px}

  /* masthead */
  header{display:flex;align-items:baseline;justify-content:space-between;
    border-bottom:1px solid var(--line);padding-bottom:14px;margin-bottom:26px;gap:16px;flex-wrap:wrap}
  .title{font-family:var(--mono);font-weight:600;font-size:18px;letter-spacing:.02em}
  .title .glow{color:var(--accent)}
  .sub{font-family:var(--mono);font-size:11.5px;color:var(--ink-faint);letter-spacing:.06em;text-transform:uppercase}

  .grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.05fr);gap:20px}
  @media (max-width:820px){.grid{grid-template-columns:1fr}}

  .panel{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:18px}
  .eyebrow{font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--ink-faint);margin:0 0 12px}
  .field{margin-bottom:16px}
  .field:last-child{margin-bottom:0}
  label.lbl{display:block;font-size:12.5px;color:var(--ink-dim);margin-bottom:6px;letter-spacing:.01em}

  /* segmented control */
  .seg{display:flex;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:3px;gap:3px}
  .seg button{flex:1;border:0;background:transparent;color:var(--ink-dim);font-family:var(--mono);
    font-size:12.5px;padding:8px 6px;border-radius:6px;cursor:pointer;transition:.12s}
  .seg button:hover{color:var(--ink)}
  .seg button[aria-pressed="true"]{background:var(--accent);color:#1a1205;font-weight:600}

  /* sensor type chips */
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{border:1px solid var(--line);background:var(--panel-2);color:var(--ink-dim);
    font-family:var(--mono);font-size:12px;padding:6px 11px;border-radius:999px;cursor:pointer;transition:.12s}
  .chip:hover{border-color:var(--accent-dim);color:var(--ink)}
  .chip[aria-pressed="true"]{border-color:var(--accent);color:var(--accent);background:rgba(238,155,58,.08)}

  select,input[type=number]{width:100%;background:var(--panel-2);border:1px solid var(--line);
    color:var(--ink);font-family:var(--mono);font-size:14px;padding:9px 11px;border-radius:7px;outline:none}
  select:focus,input:focus{border-color:var(--accent)}
  input[type=number]::-webkit-inner-spin-button{opacity:.4}

  .input-big{font-size:22px;padding:13px;letter-spacing:.01em}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .with-unit{position:relative}
  .with-unit .u{position:absolute;right:12px;top:50%;transform:translateY(-50%);
    font-family:var(--mono);color:var(--ink-faint);font-size:13px;pointer-events:none}
  .with-unit input{padding-right:46px}

  .params{border-top:1px dashed var(--line-soft);margin-top:16px;padding-top:16px}
  .hint{font-size:11.5px;color:var(--ink-faint);margin-top:7px;line-height:1.45}

  /* readout */
  .readout{background:linear-gradient(180deg,var(--panel-2),var(--panel));border:1px solid var(--line);
    border-radius:10px;padding:20px;margin-bottom:16px;position:relative;overflow:hidden}
  .readout .tag{font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint)}
  .value{font-family:var(--mono);font-weight:600;font-size:clamp(34px,7vw,52px);line-height:1.05;
    margin:6px 0 2px;letter-spacing:-.01em}
  .value .unit{font-size:.42em;font-weight:500;color:var(--ink-dim);margin-left:8px;letter-spacing:.02em}
  .value.dim{color:var(--ink-faint)}
  .from{font-family:var(--mono);font-size:12.5px;color:var(--ink-dim)}

  .metrics{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);
    border:1px solid var(--line);border-radius:9px;overflow:hidden;margin-bottom:16px}
  .metric{background:var(--panel);padding:12px 14px}
  .metric .k{font-size:11px;color:var(--ink-faint);letter-spacing:.04em;margin-bottom:3px}
  .metric .v{font-family:var(--mono);font-size:15px;color:var(--ink)}

  .flag{font-family:var(--mono);font-size:12px;padding:9px 12px;border-radius:7px;margin-top:12px;
    display:none;border:1px solid transparent;line-height:1.45}
  .flag.show{display:block}
  .flag.warn{color:var(--warn);border-color:#4a3f23;background:#2a2417}
  .flag.bad{color:var(--bad);border-color:#4a2a26;background:#2a1c19}

  /* curve */
  .curvewrap{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px 14px 10px}
  .curvehead{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
  .curvehead .cap{font-family:var(--mono);font-size:11px;color:var(--ink-dim)}
  svg{display:block;width:100%;height:auto;overflow:visible}
  .ax{stroke:var(--line);stroke-width:1}
  .axlabel{fill:var(--ink-faint);font-family:var(--mono);font-size:10px}
  .gridline{stroke:var(--line-soft);stroke-width:1}

  .toolbar{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
  .tbtn{font-family:var(--mono);font-size:11.5px;color:var(--ink-dim);background:var(--panel-2);
    border:1px solid var(--line);border-radius:7px;padding:8px 12px;cursor:pointer;transition:.12s}
  .tbtn:hover{border-color:var(--accent-dim);color:var(--ink)}
  .tbtn:active{transform:translateY(1px)}
  .tbnote{font-family:var(--mono);font-size:11px;color:var(--good)}
  .csvfallback{width:100%;height:120px;margin-top:8px;display:none;resize:vertical;
    background:var(--panel-2);border:1px solid var(--line);color:var(--ink);
    font-family:var(--mono);font-size:11px;border-radius:7px;padding:9px 11px}

  /* S–H fitter */
  .fitbox{border-top:1px dashed var(--line-soft);margin-top:14px;padding-top:14px}
  .fithint{font-size:11px;color:var(--ink-faint);line-height:1.5;margin-bottom:10px}
  .fithint b{color:var(--ink-dim);font-weight:600}
  .fitopts{display:flex;gap:10px;margin-bottom:10px}
  .lbl2{font-size:11px;color:var(--ink-dim);display:flex;flex-direction:column;gap:4px;flex:1}
  .fitdata{width:100%;height:104px;resize:vertical;background:var(--panel-2);border:1px solid var(--line);
    color:var(--ink);font-family:var(--mono);font-size:12px;border-radius:7px;padding:9px 11px;line-height:1.55}
  .fitdata:focus{outline:none;border-color:var(--accent)}
  .fitrow{display:flex;align-items:center;gap:10px;margin-top:10px}
  .fitnote{font-family:var(--mono);font-size:11px;line-height:1.4}

  footer{margin-top:26px;font-size:11.5px;color:var(--ink-faint);line-height:1.6;
    border-top:1px solid var(--line);padding-top:16px}
  footer code{font-family:var(--mono);color:var(--ink-dim)}
  kbd{font-family:var(--mono);background:var(--panel-2);border:1px solid var(--line);border-radius:4px;padding:1px 5px;font-size:11px}
</style>
</head>
<body>
<div class="wrap">
  <a href="../index.html" style="font-family:var(--mono);font-size:12px;color:var(--ink-faint);text-decoration:none;display:inline-block;margin-bottom:10px;">&larr; Tools</a>
  <header>
    <div>
      <div class="title">sensor<span class="glow">::</span>calc</div>
      <div class="sub">RTD · NTC · Silicon PTC · Thermocouple · Diode — bidirectional</div>
    </div>
    <div class="sub" id="standardTag"></div>
  </header>

  <div class="grid">
    <!-- LEFT: controls -->
    <section class="panel">
      <p class="eyebrow">Sensor</p>
      <div class="field">
        <div class="seg" id="familySeg" role="group" aria-label="Sensor family">
          <button data-fam="rtd" aria-pressed="true">RTD</button>
          <button data-fam="ntc">NTC</button>
          <button data-fam="kty">Si&nbsp;PTC</button>
          <button data-fam="tc">Thermocouple</button>
          <button data-fam="diode">Diode</button>
        </div>
      </div>

      <div class="field">
        <label class="lbl" id="modelLabel">Type</label>
        <div class="chips" id="modelChips"></div>
      </div>

      <!-- per-family parameters injected here -->
      <div id="paramHost"></div>

      <div class="params">
        <p class="eyebrow">Input</p>
        <div class="field">
          <div class="seg" id="dirSeg" role="group" aria-label="Conversion direction">
            <button data-dir="fwd" aria-pressed="true">Temp → Output</button>
            <button data-dir="rev">Output → Temp</button>
          </div>
        </div>
        <div class="field">
          <label class="lbl" id="inLabel">Temperature</label>
          <div class="with-unit">
            <input id="inVal" class="input-big" type="number" step="any" value="25">
            <span class="u" id="inUnit">°C</span>
          </div>
          <div class="hint" id="inHint"></div>
        </div>
      </div>
    </section>

    <!-- RIGHT: results -->
    <section>
      <div class="readout">
        <span class="tag" id="outTag">Output</span>
        <div class="value" id="outVal">—</div>
        <div class="from" id="outFrom"></div>
        <div class="flag" id="flag"></div>
      </div>

      <div class="metrics">
        <div class="metric"><div class="k" id="m1k">Sensitivity</div><div class="v" id="m1v">—</div></div>
        <div class="metric"><div class="k" id="m2k">Valid range</div><div class="v" id="m2v">—</div></div>
        <div class="metric"><div class="k" id="m3k">—</div><div class="v" id="m3v">—</div></div>
        <div class="metric"><div class="k" id="m4k">—</div><div class="v" id="m4v">—</div></div>
      </div>

      <div class="toolbar">
        <button class="tbtn" id="btnCopyReading">Copy reading</button>
        <button class="tbtn" id="btnCopyCsv">Copy table · CSV</button>
        <span class="tbnote" id="copyNote"></span>
      </div>
      <textarea id="csvFallback" class="csvfallback" readonly></textarea>

      <div class="curvewrap">
        <div class="curvehead">
          <span class="cap" id="curveCap">Characteristic</span>
          <span class="cap" id="curvePt"></span>
        </div>
        <svg id="curve" viewBox="0 0 520 250" preserveAspectRatio="none" aria-hidden="true"></svg>
      </div>
    </section>
  </div>

  <footer id="foot"></footer>
</div>

<script>
"use strict";
/* ============================================================
   Coefficient data + sensor maths
   ============================================================ */

// ---- RTD : IEC 60751 Callendar–Van Dusen, alpha = 0.00385 ----
const RTD = { A:3.9083e-3, B:-5.775e-7, C:-4.183e-12, min:-200, max:850 };
function rtdR(R0,t,co){
  const A=(co&&co.A!=null)?co.A:RTD.A,
        B=(co&&co.B!=null)?co.B:RTD.B,
        C=(co&&co.C!=null)?co.C:RTD.C;
  return t<0 ? R0*(1+A*t+B*t*t+C*(t-100)*t*t*t)
             : R0*(1+A*t+B*t*t);
}
function rtdT(R0,R,co){ return bisectMono(t=>rtdR(R0,t,co), R, RTD.min, RTD.max); }

// ---- NTC : beta model + Steinhart–Hart ----
const T0K = 298.15;                       // 25 °C reference
function ntcR_beta(R25,Bc,t){ return R25*Math.exp(Bc*(1/(t+273.15) - 1/T0K)); }
function ntcT_beta(R25,Bc,R){ return 1/(1/T0K + Math.log(R/R25)/Bc) - 273.15; }
function ntcT_sh(a,b,c,R){ const L=Math.log(R); return 1/(a+b*L+c*L*L*L) - 273.15; }
function ntcR_sh(a,b,c,t){                // inverse Steinhart–Hart (Cardano)
  const T=t+273.15;
  const x=(a-1/T)/c;
  const y=Math.sqrt(Math.pow(b/(3*c),3)+x*x/4);
  return Math.exp(Math.cbrt(y-x/2)-Math.cbrt(y+x/2));
}
// Solve a 3x3 linear system A·x = b (Gauss–Jordan, partial pivot). null if singular.
function solve3(A,b){
  const M=A.map((r,i)=>[r[0],r[1],r[2],b[i]]);
  for(let col=0;col<3;col++){
    let piv=col;
    for(let r=col+1;r<3;r++) if(Math.abs(M[r][col])>Math.abs(M[piv][col])) piv=r;
    if(Math.abs(M[piv][col])<1e-300) return null;
    [M[col],M[piv]]=[M[piv],M[col]];
    for(let r=0;r<3;r++){ if(r===col) continue;
      const f=M[r][col]/M[col][col];
      for(let k=col;k<4;k++) M[r][k]-=f*M[col][k];
    }
  }
  return [M[0][3]/M[0][0], M[1][3]/M[1][1], M[2][3]/M[2][2]];
}
// Parse pasted R–T table. Handles comma/space/tab/semicolon separators and comma decimals.
function parseRTtable(text,order,unit){
  const out=[];
  text.split(/\r?\n/).forEach(line=>{
    const s=line.trim(); if(!s) return;
    let fields;
    if(s.includes(";"))       fields=s.split(";").map(x=>x.trim().replace(",","."));
    else if(s.includes("\t")) fields=s.split("\t").map(x=>x.trim().replace(",","."));
    else                      fields=s.split(/[\s,]+/);
    const nums=fields.map(Number).filter(n=>isFinite(n));
    if(nums.length<2) return;
    const t = order==="rt" ? nums[1] : nums[0];
    const r = (order==="rt" ? nums[0] : nums[1]) * unit;
    if(isFinite(t) && isFinite(r) && r>0) out.push({t,r});
  });
  return out;
}
// Fit 1/T = a + b·lnR + c·(lnR)³ to (T°C, RΩ) points. 3 = exact, ≥4 = least squares.
function fitSteinhartHart(pts){
  if(pts.length<3) return {error:"Need at least 3 valid (T, R) points."};
  const L=pts.map(p=>Math.log(p.r)), y=pts.map(p=>1/(p.t+273.15));
  let coef;
  if(pts.length===3){
    coef=solve3(pts.map((_,i)=>[1,L[i],L[i]**3]), y);
  } else {
    const XtX=[[0,0,0],[0,0,0],[0,0,0]], Xty=[0,0,0];
    for(let i=0;i<pts.length;i++){ const bi=[1,L[i],L[i]**3];
      for(let r=0;r<3;r++){ Xty[r]+=bi[r]*y[i]; for(let c=0;c<3;c++) XtX[r][c]+=bi[r]*bi[c]; } }
    coef=solve3(XtX,Xty);
  }
  if(!coef||coef.some(v=>!isFinite(v)))
    return {error:"Fit failed — points may be collinear or duplicated. Use distinct low, mid & high temperatures."};
  const [a,b,c]=coef;
  let maxe=0,sse=0,worstT=null;
  for(const p of pts){ const e=Math.abs(ntcT_sh(a,b,c,p.r)-p.t);
    if(e>maxe){ maxe=e; worstT=p.t; } sse+=e*e; }
  return {a,b,c,n:pts.length,maxe,worstT,rms:Math.sqrt(sse/pts.length),exact:pts.length===3};
}

// ---- Silicon PTC (KTY family) : quadratic about a reference temperature ----
// KTY81 parts are specified at Tref=25 °C; KTY84 parts at Tref=100 °C
// (KTY84-130 is 1000 Ω at 100 °C, ~580 Ω at 25 °C — anchoring it at 25 °C
// was a real bug, off by ~75%).
function ktyR(Rref,al,be,t,tref){ const d=t-(tref==null?25:tref); return Rref*(1+al*d+be*d*d); }
function ktyT(Rref,al,be,R,tref){         // solve be*d^2 + al*d + (1-R/Rref)=0
  const c=1-R/Rref, disc=al*al-4*be*c;
  if(disc<0) return NaN;
  const d=(-al+Math.sqrt(disc))/(2*be);   // ascending branch
  return (tref==null?25:tref)+d;
}

// ---- Diode junction : linear Vf approximation about 25 °C ----
// V(T) = V25 + k·(T−25); k ≈ −2 mV/°C for silicon at ~1 mA bias. Both values
// depend on the part AND the bias current — calibrate for real use.
function diodeV(V25,k,t){ return V25 + k*(t-25); }
function diodeT(V25,k,mv){ return 25 + (mv-V25)/k; }

// ---- Thermocouples : ITS-90 / IEC 60584-1 reference functions ----
// Direct: t(°C) -> E(µV), referenced to 0 °C cold junction.
// Inverse done numerically against the exact function (bisection).
const TC = {
  K:{min:-270,max:1372,inv:[-270,1372],ranges:[
    {lo:-270,hi:0,c:[0.0000000000e+00,3.9450128025e-02,2.3622373598e-05,-3.2858906784e-07,-4.9904828777e-09,-6.7509059173e-11,-5.7410327428e-13,-3.1088872894e-15,-1.0451609365e-17,-1.9889266878e-20,-1.6322697486e-23]},
    {lo:0,hi:1372,c:[-1.7600413686e-02,3.8921204975e-02,1.8558770032e-05,-9.9457592874e-08,3.1840945719e-10,-5.6072844889e-13,5.6075059059e-16,-3.2020720003e-19,9.7151147152e-23,-1.2104721275e-26],exp:[1.1859760000e-01,-1.1834320000e-04,1.2696860000e+02]}
  ]},
  J:{min:-210,max:1200,inv:[-210,1200],ranges:[
    {lo:-210,hi:760,c:[0.0000000000e+00,5.0381187815e-02,3.0475836930e-05,-8.5681065720e-08,1.3228195295e-10,-1.7052958337e-13,2.0948090697e-16,-1.2538395336e-19,1.5631725697e-23]},
    {lo:760,hi:1200,c:[2.9645625681e+02,-1.4976127786e+00,3.1787103924e-03,-3.1847686701e-06,1.5720819004e-09,-3.0691369056e-13]}
  ]},
  T:{min:-270,max:400,inv:[-270,400],ranges:[
    {lo:-270,hi:0,c:[0.0000000000e+00,3.8748106364e-02,4.4194434347e-05,1.1844323105e-07,2.0032973554e-08,9.0138019559e-10,2.2651156593e-11,3.6071154205e-13,3.8493939883e-15,2.8213521925e-17,1.4251594779e-19,4.8768662286e-22,1.0795539270e-24,1.3945027062e-27,7.9795153927e-31]},
    {lo:0,hi:400,c:[0.0000000000e+00,3.8748106364e-02,3.3292227880e-05,2.0618243404e-07,-2.1882256846e-09,1.0996880928e-11,-3.0815758772e-14,4.5479135290e-17,-2.7512901673e-20]}
  ]},
  E:{min:-270,max:1000,inv:[-270,1000],ranges:[
    {lo:-270,hi:0,c:[0.0000000000e+00,5.8665508708e-02,4.5410977124e-05,-7.7998048686e-07,-2.5800160843e-08,-5.9452583057e-10,-9.3214058667e-12,-1.0287605534e-13,-8.0370123621e-16,-4.3979497391e-18,-1.6414776355e-20,-3.9673619516e-23,-5.5827328721e-26,-3.4657842013e-29]},
    {lo:0,hi:1000,c:[0.0000000000e+00,5.8665508710e-02,4.5032275582e-05,2.8908407212e-08,-3.3056896652e-10,6.5024403270e-13,-1.9197495504e-16,-1.2536600497e-18,2.1489217569e-21,-1.4388041782e-24,3.5960899481e-28]}
  ]},
  N:{min:-270,max:1300,inv:[-270,1300],ranges:[
    {lo:-270,hi:0,c:[0.0000000000e+00,2.6159105962e-02,1.0957484228e-05,-9.3841111554e-08,-4.6412039759e-11,-2.6303357716e-12,-2.2653438003e-14,-7.6089300791e-17,-9.3419667835e-20]},
    {lo:0,hi:1300,c:[0.0000000000e+00,2.5929394601e-02,1.5710141880e-05,4.3825627237e-08,-2.5261169794e-10,6.4311819339e-13,-1.0063471519e-15,9.9745338992e-19,-6.0863245607e-22,2.0849229339e-25,-3.0682196151e-29]}
  ]},
  R:{min:-50,max:1768.1,inv:[-50,1768.1],ranges:[
    {lo:-50,hi:1064.18,c:[0.0000000000e+00,5.2896172977e-03,1.3916658978e-05,-2.3885569302e-08,3.5691600106e-11,-4.6234766630e-14,5.0077744103e-17,-3.7310588619e-20,1.5771648237e-23,-2.8103862525e-27]},

function polyEval(c,t){ let s=0; for(let i=c.length-1;i>=0;i--) s=s*t+c[i]; return s; }
function tcEmf(type,t){                    // mV, ref 0 °C
  const d=TC[type]; const r=d.ranges.find(r=>t>=r.lo && t<=r.hi) || (t<d.ranges[0].lo?d.ranges[0]:d.ranges[d.ranges.length-1]);
  let e=polyEval(r.c,t);
  if(r.exp){ const[a0,a1,a2]=r.exp; e+=a0*Math.exp(a1*(t-a2)*(t-a2)); }
  return e;
}
function tcTempFromEmf(type,emf){          // emf already corrected to 0 °C ref
  const d=TC[type];
  return bisectMono(t=>tcEmf(type,t), emf, d.inv[0], d.inv[1]);
}

// ---- robust monotonic root finder (handles increasing OR decreasing) ----
function bisectMono(f,target,lo,hi){
  let flo=f(lo)-target, fhi=f(hi)-target;
  if(flo===0) return lo;
  if(fhi===0) return hi;
  if(flo*fhi>0) return NaN;                // target outside range
  for(let i=0;i<80;i++){
    const mid=(lo+hi)/2, fm=f(mid)-target;
    if(fm===0) return mid;
    if(flo*fm<0){ hi=mid; fhi=fm; } else { lo=mid; flo=fm; }
  }
  return (lo+hi)/2;
}
function deriv(f,x){ const h=1e-3; return (f(x+h)-f(x-h))/(2*h); }

let fam="rtd", modelIdx=0, dir="fwd";
let params={};

const $=id=>document.getElementById(id);

function activeModel(){ return MODELS[fam].list[modelIdx]; }

function fieldMeta(fam,key){
  if(fam==="rtd"){
    if(key==="A") return ["A coefficient","°C⁻¹"];
    if(key==="B") return ["B coefficient","°C⁻²"];
  }
  const m={
    R0:["R₀ at 0 °C","Ω"], R25:["R at 25 °C","Ω"], B:["β (B₂₅/₈₅)","K"],
    al:["α (linear coeff.)","/K"], be:["β (quadratic coeff.)","/K²"],
    Rref:["R at T_ref","Ω"], Tref:["Reference temp. T_ref","°C"],
    V25:["Vf at 25 °C","mV"], k:["Slope dV/dT","mV/°C"],
    a:["a","—"], b:["b","—"], c:["c","—"], cj:["Cold-junction temp.","°C"]
  };
  return m[key]||[key,""];
}
function standardLabel(){
  const cfg=MODELS[fam], m=activeModel();
  if(fam==="rtd" && m.id==="custom") return "Callendar–Van Dusen · custom A,B";
  return cfg.standard;
}
function seedInput(){
  const cfg=MODELS[fam], p=params;
  $("inVal").value = dir==="fwd" ? 25 : fmt(cfg.fwd(p,25), fam==="tc"?3:2);
}
function fmt(x,dp){
  if(!isFinite(x)) return "—";
  if(Math.abs(x)<1e-9) x=0;            // kill floating-point dust (e.g. -1.11e-14 -> 0)
  const a=Math.abs(x);
  if(dp!=null) return x.toFixed(dp);
  if(a!==0 && (a<0.01 || a>=1e6)) return x.toExponential(4);
  if(a>=1000) return x.toLocaleString('en-US',{maximumFractionDigits:2});
  if(a>=100) return x.toFixed(2);
  if(a>=1) return x.toFixed(3);
  return x.toFixed(4);
}

function buildModelChips(){
  const host=$("modelChips"); host.innerHTML="";
  $("modelLabel").textContent=MODELS[fam].label;
  MODELS[fam].list.forEach((m,i)=>{
    const b=document.createElement("button");
    b.className="chip"; b.textContent=m.name; b.setAttribute("aria-pressed", i===modelIdx);
    b.onclick=()=>{
      modelIdx=i; const keepCj = fam==="tc" && isFinite(params.cj) ? params.cj : null;
      params={...m.p}; if(keepCj!=null) params.cj=keepCj;   // don't silently reset the CJ block temp
      buildModelChips(); buildParams(); compute();
    };
    host.appendChild(b);
  });
}

function buildParams(){
  const host=$("paramHost"); host.innerHTML="";
  const m=activeModel();
  const editable=m.editable||[];
  const cfg=MODELS[fam];
  // cold junction for thermocouples is always shown
  let fields=[...editable];
  if(fam==="tc" && !fields.includes("cj")) fields.unshift("cj");
  if(!fields.length) return;
  const block=document.createElement("div"); block.className="params";
  const eb=document.createElement("p"); eb.className="eyebrow"; eb.textContent="Parameters"; block.appendChild(eb);
  const grid=document.createElement("div"); grid.className = fields.length>=3?"row3":"row2";
  fields.forEach(key=>{
    const mk=fieldMeta(fam,key);
    const f=document.createElement("div");
    const lab=document.createElement("label"); lab.className="lbl"; lab.textContent=mk[0];
    const wrap=document.createElement("div"); wrap.className="with-unit";
    const inp=document.createElement("input"); inp.type="number"; inp.step="any"; inp.id="param_"+key;
    inp.value = params[key]; inp.oninput=()=>{ const v=parseFloat(inp.value); if(isFinite(v)){params[key]=v; compute();} };
    const u=document.createElement("span"); u.className="u"; u.textContent=mk[1];
    wrap.appendChild(inp); wrap.appendChild(u);
    f.appendChild(lab); f.appendChild(wrap); grid.appendChild(f);
  });
  block.appendChild(grid);
  if(activeModel().sh){
    const h=document.createElement("div"); h.className="hint";
    h.textContent="Steinhart–Hart: 1/T = a + b·ln(R) + c·(ln R)³ (T in K). Coefficients are part-specific.";
    block.appendChild(h);
    block.appendChild(buildFitBox());
  }
  host.appendChild(block);
}

function buildFitBox(){
  const box=document.createElement("div"); box.className="fitbox";
  box.innerHTML=`
    <p class="eyebrow">Fit from datasheet table</p>
    <div class="fithint">Paste one <b>(T °C, R Ω)</b> pair per line — header rows are ignored. Use a low, mid &amp; high temperature; 4+ points gives a least-squares fit with an error estimate. Semicolon/tab and comma-decimals are accepted.</div>
    <div class="fitopts">
      <label class="lbl2">Columns<select id="fitOrder"><option value="tr">T, R</option><option value="rt">R, T</option></select></label>
      <label class="lbl2">R unit<select id="fitUnit"><option value="1">Ω</option><option value="1000">kΩ</option></select></label>
    </div>
    <textarea id="fitData" class="fitdata" spellcheck="false" placeholder="0    32650&#10;25   10000&#10;50   3603&#10;85   1075"></textarea>
    <div class="fitrow"><button class="tbtn" id="btnFit">Fit &amp; apply</button><span class="fitnote" id="fitNote"></span></div>
  `;
  box.querySelector("#btnFit").addEventListener("click",doFit);
  return box;
}
function doFit(){
  const order=$("fitOrder").value, unit=parseFloat($("fitUnit").value);
  const pts=parseRTtable($("fitData").value, order, unit);
  const note=$("fitNote");
  const res=fitSteinhartHart(pts);
  if(res.error){ note.style.color="var(--bad)"; note.textContent=res.error; return; }
  params.a=res.a; params.b=res.b; params.c=res.c; params.R25=ntcR_sh(res.a,res.b,res.c,25);
  ["a","b","c"].forEach(k=>{ const el=$("param_"+k); if(el) el.value=params[k]; });
  note.style.color="var(--good)";
  note.textContent = res.exact
    ? `Exact through ${res.n} points — add a 4th for an error estimate.`
    : `${res.n} points · max err ${res.maxe.toFixed(3)} °C @ ${fmt(res.worstT)} °C · RMS ${res.rms.toFixed(3)} °C`;
  compute();
}

function syncDirLabels(){
  const cfg=MODELS[fam];
  const fwd = dir==="fwd";
  $("inLabel").textContent  = fwd ? cfg.inName  : cfg.outName;
  $("inUnit").textContent   = fwd ? cfg.inUnit  : cfg.outUnit;
  $("outTag").textContent   = fwd ? cfg.outName : cfg.inName;
  // sensible default inputs when toggling
}

function compute(){
  const cfg=MODELS[fam], m=activeModel(), p=params;
  syncDirLabels();
  $("standardTag").textContent = standardLabel();
  $("curveCap").textContent = (fam==="tc"?"E–T":fam==="diode"?"V–T":"R–T")+" characteristic · "+m.name;

  const raw=parseFloat($("inVal").value);
  const [tmin,tmax]=cfg.range(p);
  // hard limits: beyond these the model is physically meaningless — refuse
  // instead of extrapolating. Between range and hard, extrapolate + warn.
  const hard = cfg.hard ? cfg.hard(p) : [tmin,tmax];
  let out, t, flagMsg="", flagCls="";

  if(!isFinite(raw)){ showOut(null); $("flag").className="flag"; $("curvePt").textContent=""; return; }

  const refuse=(msg)=>{
    showOut(null);
    const fl=$("flag"); fl.className="flag show bad"; fl.textContent=msg;
    setMetric(1, cfg.sensName, "—");
    setMetric(2, "Valid range", `${fmt(tmin)} … ${fmt(tmax)} °C`);
    const ex=cfg.extra? cfg.extra(p,25):[];
    setMetric(3, ex[0]?ex[0][0]:"—", ex[0]?ex[0][1]:"—");
    setMetric(4, ex[1]?ex[1][0]:"—", ex[1]?ex[1][1]:"—");
    drawCurve(cfg,p,NaN,NaN,dir);
    $("curvePt").textContent="";
  };

  if(dir==="fwd"){
    t=raw;
    if(t<hard[0]||t>hard[1]){
      refuse(`${fmt(t)} °C is beyond the physical limits of this sensor family (${fmt(hard[0])} … ${fmt(hard[1])} °C) — no meaningful result.`);
      return;
    }
    out=cfg.fwd(p,t);
    if(t<tmin||t>tmax){ flagMsg=`Outside defined range (${fmt(tmin)} … ${fmt(tmax)} °C). Result is extrapolated — don't trust it.`; flagCls="warn"; }
  } else {
    out=cfg.rev(p,raw);             // out here is the temperature
    t=out;
    if(!isFinite(out)){
      flagMsg = fam==="tc"
        ? `No solution: ${fmt(raw)} mV is outside this couple's curve (or below Type B's monotonic region ≥100 °C).`
        : `No solution: ${fmt(raw)} ${cfg.outUnit} doesn't map to a temperature for this sensor.`;
      flagCls="bad";
    } else if(t<hard[0]||t>hard[1]){
      refuse(`${fmt(raw)} ${cfg.outUnit} solves to ≈ ${fmt(t)} °C — beyond the physical limits of this sensor family (${fmt(hard[0])} … ${fmt(hard[1])} °C). Not a real reading.`);
      return;
    } else if(t<tmin||t>tmax){
      flagMsg=`Solved temperature ${fmt(t)} °C is outside the defined range — extrapolated.`; flagCls="warn";
    }
  }

  // ---- primary readout ----
  if(dir==="fwd"){
    showOut(out, cfg.outUnit, `${cfg.inName} = ${fmt(t)} ${cfg.inUnit}`);
  } else {
    showOut(out, "°C", `${cfg.outName} = ${fmt(raw)} ${cfg.outUnit}`);
  }

  // ---- flag ----
  const fl=$("flag"); fl.className="flag"+(flagMsg?` show ${flagCls}`:""); fl.textContent=flagMsg;

  // ---- metrics ----
  let sens;
  if(cfg.sens){ sens=cfg.sens(p,t); }
  else { sens=deriv(x=>cfg.fwd(p,x), t); }
  setMetric(1, cfg.sensName, isFinite(sens)? fmt(sens,sensDp(cfg.sensUnit))+" "+cfg.sensUnit : "—");
  setMetric(2, "Valid range", `${fmt(tmin)} … ${fmt(tmax)} °C`);
  const ex=cfg.extra? cfg.extra(p,t):[];
  setMetric(3, ex[0]?ex[0][0]:"—", ex[0]?ex[0][1]:"—");
  setMetric(4, ex[1]?ex[1][0]:"—", ex[1]?ex[1][1]:"—");

  // ---- curve ----
  drawCurve(cfg,p,t,out,dir);
  $("curvePt").textContent = isFinite(t)? `● ${fmt(t)} °C` : "";
}

function sensDp(u){ return u==="µV/°C"?2 : null; }

function showOut(val,unit,from){
  const v=$("outVal");
  if(val==null||!isFinite(val)){ v.className="value dim"; v.textContent="—"; $("outFrom").textContent=""; return; }
  v.className="value";
  v.innerHTML = fmt(val) + (unit?`<span class="unit">${unit}</span>`:"");
  $("outFrom").textContent = from||"";
}
function setMetric(i,k,v){ $("m"+i+"k").textContent=k; $("m"+i+"v").textContent=v; }

/* ---------- curve plotting (inline SVG) ---------- */
function drawCurve(cfg,p,markT,markOut,dir){
  const W=520,H=250, padL=46,padR=14,padT=12,padB=26;
  const [tmin,tmax]=cfg.range(p);
  const N=240, xs=[], ys=[];
  for(let i=0;i<=N;i++){
    const t=tmin+(tmax-tmin)*i/N;
    let y=cfg.fwd(p,t);
    if(isFinite(y)){ xs.push(t); ys.push(y); }
  }
  if(!ys.length){ $("curve").innerHTML=""; return; }
  const log=cfg.yLog && ys.every(v=>v>0);
  const ty=v=> log? Math.log10(v): v;
  let ymin=Math.min(...ys.map(ty)), ymax=Math.max(...ys.map(ty));
  if(ymin===ymax){ymin-=1;ymax+=1;}
  const padY=(ymax-ymin)*0.08; ymin-=padY; ymax+=padY;

  const X=t=> padL+(t-tmin)/(tmax-tmin)*(W-padL-padR);
  const Y=v=> H-padB-(ty(v)-ymin)/(ymax-ymin)*(H-padT-padB);

  // gradient id
  const path=xs.map((t,i)=>`${i?'L':'M'}${X(t).toFixed(1)},${Y(ys[i]).toFixed(1)}`).join("");

  // y ticks
  const yticks=[]; const steps=4;
  for(let i=0;i<=steps;i++){
    const vv = log? Math.pow(10, ymin+(ymax-ymin)*i/steps) : ymin+(ymax-ymin)*i/steps;
    yticks.push(vv);
  }
  // zero line if range crosses 0 (TC negative emf)
  let zeroLine="";
  if(!log && ymin<0 && ymax>0){ const y0=Y(0); zeroLine=`<line class="gridline" x1="${padL}" y1="${y0}" x2="${W-padR}" y2="${y0}" stroke-dasharray="2 3"/>`; }

  const xt0=tmin, xt1=(tmin+tmax)/2, xt2=tmax;

  let gridY="", labY="";
  yticks.forEach(v=>{ const y=Y(v); gridY+=`<line class="gridline" x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}"/>`;
    labY+=`<text class="axlabel" x="${padL-6}" y="${(y+3).toFixed(1)}" text-anchor="end">${shortNum(v)}</text>`; });

  // marker
  let marker="";
  if(isFinite(markT) && markT>=tmin && markT<=tmax){
    const mx=X(markT), my=Y(cfg.fwd(p,markT));
    marker=`<line class="ax" x1="${mx.toFixed(1)}" y1="${padT}" x2="${mx.toFixed(1)}" y2="${H-padB}" stroke="var(--accent-dim)" stroke-dasharray="2 3"/>
            <circle cx="${mx.toFixed(1)}" cy="${my.toFixed(1)}" r="4.5" fill="var(--accent)" stroke="#1a1205" stroke-width="1.5"/>`;
  }

  $("curve").innerHTML=`
    <defs>
      <linearGradient id="therm" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0" stop-color="var(--cold)"/>
        <stop offset="0.5" stop-color="var(--accent)"/>
        <stop offset="1" stop-color="var(--hot)"/>
      </linearGradient>
    </defs>
    ${gridY}${zeroLine}
    <line class="ax" x1="${padL}" y1="${padT}" x2="${padL}" y2="${H-padB}"/>
    <line class="ax" x1="${padL}" y1="${H-padB}" x2="${W-padR}" y2="${H-padB}"/>
    <path d="${path}" fill="none" stroke="url(#therm)" stroke-width="2.4" stroke-linejoin="round"/>
    ${marker}
    ${labY}
    <text class="axlabel" x="${padL}" y="${H-8}" text-anchor="start">${fmt(xt0)}</text>
    <text class="axlabel" x="${(X(xt1)).toFixed(1)}" y="${H-8}" text-anchor="middle">${fmt(xt1)} °C</text>
    <text class="axlabel" x="${W-padR}" y="${H-8}" text-anchor="end">${fmt(xt2)}</text>
    <text class="axlabel" x="${padL-6}" y="${padT+2}" text-anchor="end" transform="rotate(-90 ${padL-30} ${(H/2)})" style="transform-box:fill-box"></text>
  `;
}
function shortNum(v){
  const a=Math.abs(v);
  if(a>=1e6) return (v/1e6).toFixed(1)+"M";
  if(a>=1e3) return (v/1e3).toFixed(a>=1e4?0:1)+"k";
  if(a===0) return "0";
  if(a<1) return v.toFixed(2);
  return v.toFixed(a<100?1:0);
}

/* ---------- wiring ---------- */
$("familySeg").addEventListener("click",e=>{
  const b=e.target.closest("button"); if(!b) return;
  [...e.currentTarget.children].forEach(x=>x.setAttribute("aria-pressed",x===b));
  fam=b.dataset.fam; modelIdx=0; params={...MODELS[fam].list[0].p};
  // reset to a round-trippable default for the current direction
  seedInput();
  buildModelChips(); buildParams(); compute();
});
$("dirSeg").addEventListener("click",e=>{
  const b=e.target.closest("button"); if(!b) return;
  [...e.currentTarget.children].forEach(x=>x.setAttribute("aria-pressed",x===b));
  dir=b.dataset.dir;
  // swap default input to something valid in the new direction
  seedInput();
  compute();
});
$("inVal").addEventListener("input",compute);

/* ---------- export / copy ---------- */
function currentReadingText(){
  const cfg=MODELS[fam], m=activeModel(), p=params;
  const raw=parseFloat($("inVal").value);
  if(!isFinite(raw)) return "";
  if(dir==="fwd"){
    const out=cfg.fwd(p,raw);
    return `${m.name}: ${fmt(raw)} ${cfg.inUnit} -> ${fmt(out)} ${cfg.outUnit}  [${standardLabel()}]`;
  }
  const t=cfg.rev(p,raw);
  return `${m.name}: ${fmt(raw)} ${cfg.outUnit} -> ${fmt(t)} °C  [${standardLabel()}]`;
}
function buildCsv(){
  const cfg=MODELS[fam], m=activeModel(), p=params;
  const [tmin,tmax]=cfg.range(p);
  const span=tmax-tmin;
  const step = span>1200?25 : span>500?10 : span>200?5 : span>40?2 : 1;
  const outCol = fam==="tc" ? "EMF_mV" : fam==="diode" ? "Vf_mV" : "R_ohm";
  const L=[];
  L.push(`# sensor::calc  ${fam.toUpperCase()} ${m.name}`);
  L.push(`# ${standardLabel()}`);
  const pj=Object.entries(p).filter(([k])=>k!=="cj").map(([k,v])=>`${k}=${v}`).join("  ");
  if(pj) L.push(`# params: ${pj}`);
  if(fam==="tc") L.push(`# cold junction = ${p.cj} C (EMF is cold-junction referenced)`);
  L.push(`Temperature_C,${outCol}`);
  const rows=[];
  for(let t=tmin;t<=tmax+1e-9;t+=step) rows.push(Math.round(t*1e6)/1e6);
  if(rows[rows.length-1] < tmax-1e-9) rows.push(tmax);
  for(const t of rows){
    const y=cfg.fwd(p,t);
    if(isFinite(y)) L.push(`${Math.round(t*100)/100},${Number(y.toFixed(4))}`);
  }
  return L.join("\r\n");
}
async function copyText(s){
  try{ await navigator.clipboard.writeText(s); return true; }
  catch(_){
    try{
      const ta=document.createElement("textarea"); ta.value=s;
      ta.style.position="fixed"; ta.style.top="-1000px"; document.body.appendChild(ta);
      ta.focus(); ta.select(); const ok=document.execCommand("copy"); ta.remove(); return ok;
    }catch(__){ return false; }
  }
}
let noteTimer=null;
function flashNote(msg,ok){
  const n=$("copyNote"); n.textContent=msg; n.style.color=ok?"var(--good)":"var(--bad)";
  clearTimeout(noteTimer); noteTimer=setTimeout(()=>{ n.textContent=""; },2600);
}
$("btnCopyReading").addEventListener("click",async()=>{
  const txt=currentReadingText();
  if(!txt){ flashNote("Nothing to copy",false); return; }
  const ok=await copyText(txt); flashNote(ok?"Reading copied ✓":"Copy blocked — try again",ok);
});
$("btnCopyCsv").addEventListener("click",async()=>{
  const csv=buildCsv();
  if(await copyText(csv)){ $("csvFallback").style.display="none"; flashNote("CSV copied ✓",true); }
  else { const fb=$("csvFallback"); fb.style.display="block"; fb.value=csv; fb.focus(); fb.select();
         flashNote("Copy from the box below (Ctrl/⌘+C)",false); }
});

$("foot").innerHTML=`
  <strong style="color:var(--ink-dim);font-weight:600">References & assumptions.</strong>
  RTD: IEC 60751 Callendar–Van Dusen, standard α = 0.00385 (A=3.9083e-3, B=-5.775e-7, C=-4.183e-12), incl. sub-zero term. For non-IEC alpha grades (e.g. US 0.003911, JIS 0.003916) use <em>Custom A/B</em> and enter the coefficients from your sensor's datasheet — the sub-zero C term keeps the IEC default.
  Thermocouples: ITS-90 / IEC 60584-1 reference functions, cold junction referenced to 0 °C by default — set your actual block temperature in <em>Cold-junction temp</em>. Voltage→temperature is solved numerically against the exact emf function. Type B is non-monotonic below ~42 °C, so its inverse is limited to ≥100 °C.
  NTC β-model and KTY quadratic are <em>approximations</em>; β and KTY coefficients vary by part — pull them from the actual datasheet. NTC defaults (e.g. B3950) are typical, not authoritative. KTY81 is referenced at 25 °C, KTY84 at 100 °C (T_ref).
  Diode: linear V<sub>f</sub> approximation at constant bias current (−2 mV/°C rule of thumb for silicon at ~1 mA). Presets are typical; V<sub>f</sub> and slope depend on the exact part <em>and</em> the bias current — for real measurements calibrate V₂₅ and the slope at two known temperatures.
  No warranty — verify against the manufacturer reference table before commissioning use.
`;

// init
params={...MODELS[fam].list[0].p};
buildModelChips(); buildParams(); compute();
